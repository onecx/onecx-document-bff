# AUTHENTICATED
quarkus.http.auth.permission.health.paths=/q/*
quarkus.http.auth.permission.health.policy=permit
quarkus.http.auth.permission.default.paths=/*
quarkus.http.auth.permission.default.policy=authenticated

onecx.permissions.application-id=${quarkus.application.name}

#PROD
%prod.quarkus.rest-client.onecx_document_svc.url = http://onecx-document-svc:8080

# propagate the apm-principal-token from requests we receive
org.eclipse.microprofile.rest.client.propagateHeaders=apm-principal-token

quarkus.http.limits.max-body-size=20240K

# DEV
%dev.quarkus.rest-client.onecx_document_svc.url=http://localhost:8080

# BUILD
quarkus.openapi-generator.codegen.input-base-dir=target/tmp/openapi

# OneCX Document Internal Client
quarkus.openapi-generator.codegen.spec.onecx_document_svc_yaml.config-key=onecx_document_svc
quarkus.openapi-generator.codegen.spec.onecx_document_svc_yaml.base-package=gen.org.tkit.onecx.document.client
quarkus.openapi-generator.codegen.spec.onecx_document_svc_yaml.return-response=true
quarkus.openapi-generator.codegen.spec.onecx_document_svc_yaml.additional-api-type-annotations=@org.eclipse.microprofile.rest.client.annotation.RegisterClientHeaders;
quarkus.openapi-generator.codegen.spec.onecx_document_svc_yaml.enable-security-generation=false
quarkus.openapi-generator.codegen.spec.onecx_document_svc_yaml.import-mappings=MultipartFormDataInput=org.jboss.resteasy.reactive.server.multipart.MultipartFormDataInput
quarkus.openapi-generator.codegen.spec.onecx_document_svc_yaml.type-mappings.File=java.io.File
quarkus.openapi-generator.codegen.spec.onecx_document_svc_yaml.type-mappings.MultipartFormDataInput=org.jboss.resteasy.reactive.server.multipart.MultipartFormDataInput

# OneCX File Storage Client
quarkus.openapi-generator.codegen.spec.onecx_file_storage_svc_yaml.config-key=onecx_file_storage_svc
quarkus.openapi-generator.codegen.spec.onecx_file_storage_svc_yaml.base-package=gen.org.tkit.onecx.filestorage.client
quarkus.openapi-generator.codegen.spec.onecx_file_storage_svc_yaml.return-response=true
quarkus.openapi-generator.codegen.spec.onecx_file_storage_svc_yaml.enable-security-generation=false
quarkus.openapi-generator.codegen.spec.onecx_file_storage_svc_yaml.additional-api-type-annotations=@org.eclipse.microprofile.rest.client.annotation.RegisterClientHeaders;
quarkus.openapi-generator.codegen.spec.onecx_file_storage_svc_yaml.additional-model-type-annotations=@io.quarkus.runtime.annotations.RegisterForReflection;


# Parameters used for identifying uploaded files in the external storage service
onecx.document.file-storage.product-name=onecx-document
onecx.document.file-storage.application-id=onecx-document-bff
onecx.document.file-storage.file-name-separator=_

#OIDC
%prod.quarkus.rest-client.onecx_document_svc.providers=io.quarkus.oidc.client.reactive.filter.OidcClientRequestReactiveFilter
%prod.quarkus.oidc-client.client-id=${quarkus.application.name}

#Integration Test
quarkus.test.integration-test-profile=test

#TEST
%test.onecx.permissions.product-name=applications
%test.org.eclipse.microprofile.rest.client.propagateHeaders=apm-principal-token,apm-username
%test.tkit.rs.context.token.header-param=apm-principal-token
%test.tkit.rs.context.token.enabled=true
%test.quarkus.rest-client.onecx_document_svc.providers=io.quarkus.oidc.client.reactive.filter.OidcClientRequestReactiveFilter
%test.tkit.rs.context.tenant-id.mock.claim-org-id=orgId
%test.quarkus.rest-client.onecx_permission.url=${quarkus.mockserver.endpoint}
%test.quarkus.oidc-client.auth-server-url=${quarkus.oidc.auth-server-url}
%test.quarkus.oidc-client.client-id=${quarkus.oidc.client-id}
%test.quarkus.oidc-client.credentials.secret=${quarkus.oidc.credentials.secret}

%test.quarkus.rest-client.onecx_document_svc.url=${quarkus.mockserver.endpoint}
%test.quarkus.rest-client.onecx_file_storage_svc.url=${quarkus.mockserver.endpoint}

%test.quarkus.mockserver.devservices.config-file=/mockserver.properties
%test.quarkus.mockserver.devservices.config-dir=/mockserver
%test.quarkus.http.test-port=0
%test.tkit.log.json.enabled=false
%test.quarkus.mockserver.devservices.config-class-path=true
%test.quarkus.mockserver.devservices.log=true
%test.quarkus.mockserver.devservices.reuse=true
